# Snapshot config used after the Quarter-Finals conclude.
# 4 teams remain (SF → Final). High simulation count for precise title odds.
# Usage: wc2026 forecast --config configs/after_quarter_finals.yaml --history ... --seeding ...

project_name: wc2026-predictor

paths:
  raw: data/raw
  interim: data/interim
  processed: data/processed
  external: data/external
  models: models
  outputs: outputs

elo:
  start_rating: 1500.0
  k_base: 40.0
  home_advantage: 65.0
  default_importance: 30.0
  importance:
    "FIFA World Cup": 60.0
    "UEFA Euro": 50.0
    "Copa America": 50.0
    "African Cup of Nations": 50.0
    "AFC Asian Cup": 50.0
    "Gold Cup": 50.0
    "UEFA Nations League": 40.0
    "FIFA World Cup qualification": 40.0
    "UEFA Euro qualification": 40.0
    "Friendly": 20.0

poisson:
  max_goals: 10
  shootout_elo_scale: 0.0025

# 4 remaining teams; 500k sims gives sub-0.1% Monte-Carlo error on title odds.
simulation:
  n_simulations: 500000
  random_seed: 42

model:
  backend: elo_poisson
  target: goals
  params: {}