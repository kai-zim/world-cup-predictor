name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project (with dev extras)
        run: uv pip install --system -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Mypy
        run: mypy src

      - name: Pytest (runs entirely against bundled example fixtures, no network access)
        run: pytest -q
